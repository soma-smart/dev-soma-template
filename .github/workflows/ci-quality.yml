name: CI Qualité

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Ruff + Mypy + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true

      - name: Installer les dépendances
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest
