name: CI Sécurité

on:
  pull_request:
    branches: [main]

jobs:
  security:
    name: Bandit + pip-audit + Gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true

      - name: Installer les dépendances
        run: uv sync --frozen --group dev

      - name: Bandit (SAST)
        run: uv run bandit -r src/ --severity-level high --confidence-level high

      - name: pip-audit (vulnérabilités dépendances)
        run: uv run pip-audit

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
